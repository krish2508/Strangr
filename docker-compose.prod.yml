x-awslogs-defaults: &awslogs-defaults
  driver: awslogs
  options:
    awslogs-region: ${AWS_REGION}
    awslogs-create-group: "true"

services:
  reverse-proxy:
    image: caddy:2.10-alpine
    container_name: strangr-caddy
    restart: unless-stopped
    env_file:
      - ./deploy/env/production.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    logging:
      <<: *awslogs-defaults
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-create-group: "true"
        awslogs-group: ${CLOUDWATCH_LOG_GROUP_PREFIX:-/strangr/prod}/reverse-proxy
        awslogs-stream: caddy
    networks:
      - strangr

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - ./deploy/env/frontend.production.env
    container_name: strangr-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      <<: *awslogs-defaults
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-create-group: "true"
        awslogs-group: ${CLOUDWATCH_LOG_GROUP_PREFIX:-/strangr/prod}/frontend
        awslogs-stream: frontend
    networks:
      - strangr

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: strangr-backend
    restart: unless-stopped
    env_file:
      - ./deploy/env/production.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      <<: *awslogs-defaults
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-create-group: "true"
        awslogs-group: ${CLOUDWATCH_LOG_GROUP_PREFIX:-/strangr/prod}/backend
        awslogs-stream: backend
    networks:
      - strangr

  redis:
    image: redis:7-alpine
    container_name: strangr-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      <<: *awslogs-defaults
      options:
        awslogs-region: ${AWS_REGION}
        awslogs-create-group: "true"
        awslogs-group: ${CLOUDWATCH_LOG_GROUP_PREFIX:-/strangr/prod}/redis
        awslogs-stream: redis
    networks:
      - strangr

networks:
  strangr:
    driver: bridge

volumes:
  redis_data:
  caddy_data:
  caddy_config:
