name: Deploy To EC2

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            cd ~/Strangr
            git pull origin prod
            docker-compose --env-file deploy/env/production.env -f docker-compose.prod.yml build --no-cache
            docker-compose --env-file deploy/env/production.env -f docker-compose.prod.yml up -d
            docker-compose --env-file deploy/env/production.env -f docker-compose.prod.yml exec -T backend alembic upgrade head
